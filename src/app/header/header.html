<header
  class="flex justify-between py-3 px-4 items-center bg-silver dark:bg-dark-surface border-b border-b-silver-border dark:border-b-dark-border shadow-[0_4px_6px_rgba(0,0,0,0.1)] mb-5 transition-colors duration-300"
>
  <a href="/" class="flex gap-2 items-center justify-center">
    <svg
      lucideGauge
      [size]="20"
      class="text-navy dark:text-dark-text transition-colors duration-300"
    ></svg>
    <span
      class="font-display font-medium text-lg text-navy dark:text-dark-text transition-colors duration-300"
      >CarVitals</span
    >
  </a>

  <div class="flex items-center gap-1">
    <button
      type="button"
      (click)="translation.toggle()"
      class="rounded-lg px-3 py-2 text-sm font-medium text-navy dark:text-dark-text hover:bg-silver-hover dark:hover:bg-dark-border transition-colors duration-300 cursor-pointer"
      [attr.aria-label]="translation.lang() === 'en' ? 'Switch to Ukrainian' : 'Switch to English'"
    >
      {{ translation.lang() === 'en' ? 'UA' : 'EN' }}
    </button>

    <button
      type="button"
      (click)="theme.toggle()"
      class="rounded-lg p-2 text-navy dark:text-dark-text hover:bg-silver-hover dark:hover:bg-dark-border transition-colors duration-300 cursor-pointer"
      [attr.aria-label]="theme.isDark() ? 'Switch to light theme' : 'Switch to dark theme'"
    >
      @if (theme.isDark()) {
        <svg lucideSun [size]="20"></svg>
      } @else {
        <svg lucideMoon [size]="20"></svg>
      }
    </button>
  </div>
</header>
