<section
  class="flex flex-col h-[calc(100vh-90px)] bg-silver dark:bg-dark-surface rounded-2xl overflow-hidden mx-4 sm:mx-0 transition-colors duration-300"
>
  <div class="flex-1 flex flex-col gap-2 sm:gap-2.5 p-3 sm:p-4 overflow-y-auto">
    @for (msg of gemini.messages(); track $index) {
      @if (msg.role === 'user') {
        <div
          class="self-end max-w-[85%] sm:max-w-[70%] px-3 sm:px-3.5 py-2 sm:py-2.5 rounded-2xl rounded-br-sm bg-navy dark:bg-dark-border text-silver text-sm leading-relaxed transition-colors duration-300"
        >
          {{ msg.text }}
        </div>
      } @else {
        <div class="self-start flex gap-2 max-w-[85%] sm:max-w-[70%]">
          <span
            class="w-6 h-6 rounded-[7px] bg-silver-hover dark:bg-dark-border flex items-center justify-center shrink-0 mt-0.5 transition-colors duration-300"
          >
            <svg
              lucideWrench
              class="text-navy dark:text-dark-text w-3 h-3 transition-colors duration-300"
            ></svg>
          </span>
          <div
            class="px-3 sm:px-3.5 py-2 sm:py-2.5 rounded-2xl rounded-tl-sm bg-white dark:bg-dark-bg border border-silver-border dark:border-dark-border text-navy-dark dark:text-dark-text text-sm leading-relaxed transition-colors duration-300 prose-chat"
            [innerHTML]="renderMarkdown(msg.text)"
          ></div>
        </div>
      }
    }

    @if (gemini.loading()) {
      <div class="self-start flex gap-2 max-w-[85%] sm:max-w-[70%]">
        <span
          class="w-6 h-6 rounded-[7px] bg-silver-hover dark:bg-dark-border flex items-center justify-center shrink-0 mt-0.5 transition-colors duration-300"
        >
          <svg
            lucideWrench
            class="text-navy dark:text-dark-text w-3 h-3 transition-colors duration-300"
          ></svg>
        </span>
        <div
          class="flex gap-1 px-3 sm:px-3.5 py-2.5 sm:py-3 rounded-2xl rounded-tl-sm bg-white dark:bg-dark-bg border border-silver-border dark:border-dark-border transition-colors duration-300"
        >
          <span class="typing-dot"></span>
          <span class="typing-dot" style="animation-delay: 0.2s"></span>
          <span class="typing-dot" style="animation-delay: 0.4s"></span>
        </div>
      </div>
    }
  </div>

  <div
    class="flex gap-2 p-2.5 sm:p-3 border-t border-silver-border dark:border-dark-border bg-white dark:bg-dark-bg transition-colors duration-300"
  >
    <input
      [ngModel]="userInput()"
      (ngModelChange)="userInput.set($event)"
      (keyup.enter)="send()"
      [placeholder]="translation.t('chat.placeholder')"
      class="flex-1 px-3 sm:px-3.5 py-2 sm:py-2.5 rounded-[10px] border border-silver-border dark:border-dark-border bg-silver dark:bg-dark-surface text-navy-dark dark:text-dark-text text-sm sm:text-base placeholder-text-muted outline-none focus:border-accent transition-colors duration-300"
    />
    <button
      (click)="send()"
      class="flex items-center gap-1.5 px-3.5 sm:px-4.5 py-2 sm:py-2.5 rounded-[10px] bg-accent text-silver font-medium text-sm hover:opacity-90 transition-opacity cursor-pointer"
    >
      <svg lucideSend class="w-3.5 h-3.5 sm:w-[15px] sm:h-[15px]"></svg>
      <span class="hidden sm:inline">{{ translation.t('chat.send') }}</span>
    </button>
  </div>
</section>
